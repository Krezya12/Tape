<style>
    .lms-footer {
        margin-top: auto;
        border-top: 1px solid var(--border);
        background: var(--bg-card);
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        flex-shrink: 0;
    }

    .footer-left {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .footer-brand {
        display: flex;
        align-items: center;
        gap: 7px;
        text-decoration: none;
    }

    .footer-logo-mark {
        width: 22px;
        height: 22px;
        background: linear-gradient(135deg, var(--jade-600), var(--jade-400));
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .625rem;
        font-weight: 800;
        color: #fff;
        flex-shrink: 0;
    }

    .footer-brand-name {
        font-size: .8125rem;
        font-weight: 600;
        color: var(--text-secondary);
    }

    .footer-copy {
        font-size: .75rem;
        color: var(--text-muted);
    }

    .footer-links {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .footer-link {
        font-size: .75rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color .15s ease;
    }

    .footer-link:hover {
        color: var(--color-primary);
    }

    .footer-sep {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--border-strong);
        flex-shrink: 0;
    }

    .footer-right {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .footer-version {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: .6875rem;
        font-weight: 600;
        color: var(--text-muted);
        font-family: var(--font-mono);
        background: var(--bg-body);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 2px 8px;
    }

    .footer-status {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: .6875rem;
        font-weight: 600;
        color: var(--jade-700);
    }

    .footer-status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--jade-500);
        animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
        0%, 100% {
            opacity: 1;
        }
        50% {
            opacity: .45;
        }
    }

    [data-theme=dark] .lms-footer {
        background: var(--bg-card);
        border-color: var(--border);
    }

    [data-theme=dark] .footer-status {
        color: #4ADE80;
    }

    [data-theme=dark] .footer-status-dot {
        background: #22C55E;
    }

    [data-theme=dark] .footer-version {
        background: rgba(255, 255, 255, .04);
        border-color: var(--border);
    }

    @media (max-width: 640px) {
        .lms-footer {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
        }

        .footer-links {
            gap: 10px;
        }

        .footer-right {
            gap: 12px;
        }
    }
</style>

<footer class="lms-footer" role="contentinfo">

    <div class="footer-left">
        <a href="/" class="footer-brand" title="PDP Academy LMS">
            <div class="footer-logo-mark" aria-hidden="true">P</div>
            <span class="footer-brand-name">PDP Academy LMS</span>
        </a>

        <span class="footer-copy">
      &copy; {% now "Y" %} PDP Academy. All rights reserved.

    </span>

        <nav class="footer-links" aria-label="Footer links">
            <a class="footer-link" href="/privacy/">Privacy Policy</a>
            <span class="footer-sep" aria-hidden="true"></span>
            <a class="footer-link" href="/terms/">Terms of Use</a>
            <span class="footer-sep" aria-hidden="true"></span>
            <a class="footer-link" href="mailto:{{ support_email|default:'support@pdp.uz' }}">Support</a>
            <span class="footer-sep" aria-hidden="true"></span>
            <a class="footer-link" href="/docs/">Documentation</a>
        </nav>
    </div>

    <div class="footer-right">

        <div class="footer-status" title="All systems operational">
            <span class="footer-status-dot" aria-hidden="true"></span>
            All systems operational
        </div>

        <div class="footer-version" title="Application version">
            v{{ app_version|default:'2.4.1' }}
        </div>

    </div>

</footer>
