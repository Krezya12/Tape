<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель Администратора</title>
    <style>
        :root {
            /* Палитра "Выцветший неон" */
            --pastel-blue: #A2D2FF;      /* Выцветше-голубой */
            --bright-blue: #70b8ff;     /* Чуть ярче для наведения */
            --pastel-yellow: #FEF9A7;    /* Выцветше-желтый */
            --bright-yellow: #FAC213;    /* Яркий акцент для кнопок */
            --bg-gray: #F9F9F9;
            --text-main: #4A4A4A;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--bg-gray);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Сайдбар */
        .sidebar {
            width: 250px;
            background-color: var(--pastel-blue);
            height: 100vh;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar h2 {
            color: var(--white);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .nav-item {
            display: block;
            padding: 12px 15px;
            color: var(--white);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: background 0.3s;
            font-weight: 500;
        }

        .nav-item:hover {
            background-color: var(--bright-blue);
        }

        /* Основной контент */
        .main-content {
            flex-grow: 1;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--pastel-yellow);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #888;
        }

        .stat-card p {
            margin: 10px 0 0;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
        }

        /* Кнопки действий */
        .action-btn {
            background-color: var(--pastel-yellow);
            color: #7d6b00; /* Темно-желтый текст для читаемости */
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 0px #e6e086;
        }

        .action-btn:hover {
            background-color: var(--bright-yellow);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 6px 0px #d4a510;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .data-table {
            width: 100%;
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            border-collapse: collapse;
        }

        .data-table th {
            background-color: #f0f7ff;
            color: var(--bright-blue);
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #f1f1f1;
        }

        .badge-teacher { background: var(--pastel-blue); color: white; padding: 4px 8px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>LMS Admin</h2>
    <a href="#" class="nav-item">📊 Дашборд</a>
    <a href="#" class="nav-item">👥 Учителя</a>
    <a href="#" class="nav-item">🎓 Группы</a>
    <a href="#" class="nav-item">📝 Логи рассылки</a>
</div>

<div class="main-content">
    <div class="header">
        <h1>Обзор системы</h1>
        <button class="action-btn">+ СОЗДАТЬ ГРУППУ</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Всего учеников</h3>
            <p>128</p>
        </div>
        <div class="stat-card" style="border-left-color: var(--pastel-blue);">
            <h3>Активных групп</h3>
            <p>12</p>
        </div>
        <div class="stat-card">
            <h3>Уведомлений сегодня</h3>
            <p>452</p>
        </div>
    </div>

    <div class="header">
        <h2>Распределение групп</h2>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>Название группы</th>
                <th>Учитель</th>
                <th>Кол-во учеников</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><b>Python Pro 1</b></td>
                <td><span class="badge-teacher">Иван Иванов</span></td>
                <td>15</td>
                <td><button class="action-btn" style="padding: 5px 15px; font-size: 0.8rem;">Редактировать</button></td>
            </tr>
            <tr>
                <td><b>Design Base 2</b></td>
                <td><span class="badge-teacher">Анна Смит</span></td>
                <td>12</td>
                <td><button class="action-btn" style="padding: 5px 15px; font-size: 0.8rem;">Редактировать</button></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
