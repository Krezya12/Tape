{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=login">
    <title>PDP Academy LMS</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
            font-family: var(--font-sans);
        }

        .splash {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .splash-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #16A34A, #4ADE80);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 24px rgba(22, 163, 74, .25);
        }

        .splash-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0F172A;
            letter-spacing: -.03em;
        }

        .splash-sub {
            font-size: .9375rem;
            color: #94A3B8;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #E2E8F0;
            border-top-color: #16A34A;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin-top: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div class="splash">
    <div class="splash-logo">P</div>
    <div class="splash-name">PDP Academy LMS</div>
    <div class="splash-sub">Loading your workspace…</div>
    <div class="spinner"></div>
</div>
<script>
    setTimeout(() => {
        window.location.href = 'login.html';
    }, 800);
</script>
</body>
</html>
